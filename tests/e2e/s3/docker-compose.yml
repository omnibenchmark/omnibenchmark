services:
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.85
    container_name: omnibenchmark-rustfs-e2e
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  rustfs_data:
    driver: local
